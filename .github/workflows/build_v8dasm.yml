name: Build v8dasm for V8 10.2.154.26

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl python3 ninja-build clang pkg-config build-essential lsb-release

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      - name: Fetch V8 source
        run: |
          cd ~
          fetch v8
          cd v8
          git checkout refs/tags/10.2.154.26
          gclient sync -D

      - name: Apply patches
        run: |
          python3 $GITHUB_WORKSPACE/apply_v8_patch.py ~/v8

      - name: Configure build
        run: |
          cd ~/v8
          ./tools/dev/v8gen.py x64.release
          cat > out.gn/x64.release/args.gn << 'ARGS'
          dcheck_always_on = false
          is_component_build = false
          is_debug = false
          target_cpu = "x64"
          use_custom_libcxx = false
          v8_monolithic = true
          v8_use_external_startup_data = false
          v8_static_library = true
          v8_enable_disassembler = true
          v8_enable_object_print = true
          v8_enable_pointer_compression = false
          ARGS

      - name: Build V8 monolith
        run: |
          cd ~/v8
          ninja -C out.gn/x64.release v8_monolith

      - name: Build v8dasm (patch-based)
        run: |
          cp $GITHUB_WORKSPACE/v8dasm.cpp ~/v8/
          cd ~/v8
          clang++ v8dasm.cpp -g -std=c++17 -Iinclude -Lout.gn/x64.release/obj \
            -lv8_libbase -lv8_libplatform -lv8_monolith -o v8dasm -ldl -pthread

      - name: Build v8dasm_internal (internal API)
        run: |
          cp $GITHUB_WORKSPACE/v8dasm_internal.cpp ~/v8/
          cd ~/v8
          clang++ v8dasm_internal.cpp -g -std=c++17 -I. -Iinclude \
            -Lout.gn/x64.release/obj \
            -lv8_libbase -lv8_libplatform -lv8_monolith \
            -o v8dasm_internal -ldl -pthread 2>&1 || echo "Internal build failed (expected if headers differ)"

      - name: Upload v8dasm binaries
        uses: actions/upload-artifact@v4
        with:
          name: v8dasm-10.2.154.26-linux
          path: |
            ~/v8/v8dasm
            ~/v8/v8dasm_internal
          retention-days: 30
